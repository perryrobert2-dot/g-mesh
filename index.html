<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "background": "#020617",
                "surface": "#0f172a",
                "primary": "#38bdf8",
                "secondary": "#64748b",
                "border": "#1e293b",
                "text-main": "#f8fafc",
                "text-muted": "#94a3b8"
            },
            "fontFamily": {
                "headline": ["Space Grotesk"],
                "body": ["Inter"]
            }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; line-height: 1.6; }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
        .grid-bg { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 40px 40px; }
    </style>
</head>
<body class="selection:bg-primary/20">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
